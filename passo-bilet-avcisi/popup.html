<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Passo Bilet Avcısı</title>
<style>
  body { font: 13px/1.4 system-ui, sans-serif; width: 340px; padding: 12px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 8px; color: #c1121f; }
  label { display: block; margin-top: 8px; font-weight: 600; font-size: 12px; }
  input[type=text], select { width: 100%; box-sizing: border-box; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
  .row { display: flex; gap: 6px; margin-top: 10px; }
  button { flex: 1; padding: 8px; border: 0; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; }
  .primary { background: #c1121f; color: white; }
  .ghost { background: #eee; }
  .status { margin-top: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; font-size: 11px; }
  .status b { color: #333; }
  .ok { color: #0a7d2c; }
  .err { color: #c1121f; }
  .warn { color: #b86e00; }
  .muted { color: #888; font-size: 11px; margin-top: 6px; }
  .checkbox { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; }
</style>
</head>
<body>
  <h1>🎟️ Passo Bilet Avcısı</h1>

  <label>Maç sayfası URL</label>
  <input type="text" id="eventUrl" />

  <label>Kategori metni</label>
  <input type="text" id="category" />

  <label>Fiyat</label>
  <input type="text" id="price" />

  <div class="checkbox">
    <input type="checkbox" id="autoBuy" disabled>
    <label for="autoBuy" style="font-weight:400;margin:0">Otomatik satın al (v0.2 — yakında)</label>
  </div>

  <div class="row">
    <button id="startBtn" class="primary">İzlemeyi Başlat</button>
    <button id="stopBtn" class="ghost">Durdur</button>
  </div>

  <div class="row">
    <button id="testAlarmBtn" class="ghost">🔊 Alarmı Test Et</button>
    <button id="testNotifBtn" class="ghost">🔔 Bildirim</button>
  </div>

  <div class="row">
    <button id="pollNowBtn" class="ghost">⟳ Şimdi Kontrol Et</button>
  </div>

  <div class="status" id="status">yükleniyor...</div>
  <div class="muted">
    Passo maç sayfasını açık tutun + login olun.<br>
    Bilgisayar uyumasın (Güç ayarları).
  </div>

  <script src="popup.js"></script>
</body>
</html>
